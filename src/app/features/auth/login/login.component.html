<div class="login-wrapper">
    <div class="login-card">
        <header class="login-header">
            <div class="brand-icon">
                <span class="box-emoji">📦</span>
            </div>
            <h1 class="brand-name">WMS Intranet</h1>
            <p class="brand-subtitle">Sistema de Gestión de Almacén</p>
        </header>

        <form
            [formGroup]="loginForm"
            (ngSubmit)="onSubmit()"
            class="login-form"
        >
            <h2 class="form-title">Iniciar Sesión</h2>

            <div class="input-group-custom">
                <label for="identifier">USUARIO / EMAIL</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input
                        id="identifier"
                        type="text"
                        formControlName="identifier"
                        placeholder="admin_user / admin@manufactura.com"
                    />
                </div>
            </div>

            <div class="input-group-custom">
                <label for="password">CONTRASEÑA</label>
                <div class="input-wrapper input-wrapper--password">
                    <span class="input-icon">🔒</span>
                    <input
                        id="password"
                        [type]="showPassword() ? 'text' : 'password'"
                        formControlName="password"
                        placeholder="••••••••"
                    />
                    <button
                        type="button"
                        class="password-toggle"
                        (click)="togglePasswordVisibility()"
                        [attr.aria-label]="
                            showPassword()
                                ? 'Ocultar contraseña'
                                : 'Mostrar contraseña'
                        "
                    >
                        @if (showPassword()) {
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                aria-hidden="true"
                            >
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                                />
                                <path
                                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                                />
                                <line x1="1" y1="1" x2="23" y2="23" />
                                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                            </svg>
                        } @else {
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                aria-hidden="true"
                            >
                                <path
                                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                                />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        }
                    </button>
                </div>
            </div>

            <div class="error-container" *ngIf="errorMessage">
                <span class="error-icon">⚠️</span> {{ errorMessage }}
            </div>

            <button
                type="submit"
                class="btn-login"
                [disabled]="loginForm.invalid"
            >
                <span>Ingresar al Sistema</span>
            </button>

            <footer class="form-footer">
                <p>
                    ¿Olvidaste tu contraseña? <a href="#">Contactar soporte</a>
                </p>
            </footer>
        </form>
    </div>
</div>
