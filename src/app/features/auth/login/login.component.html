<div class="login-wrapper">
    <div class="login-card">
        <header class="login-header">
            <div class="brand-icon">
                <span class="box-emoji">📦</span>
            </div>
            <h1 class="brand-name">WMS Intranet</h1>
            <p class="brand-subtitle">Sistema de Gestión de Almacén</p>
        </header>

        <form
            [formGroup]="loginForm"
            (ngSubmit)="onSubmit()"
            class="login-form"
        >
            <h2 class="form-title">Iniciar Sesión</h2>

            <div class="input-group-custom">
                <label for="identifier">USUARIO / EMAIL</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input
                        id="identifier"
                        type="text"
                        formControlName="identifier"
                        placeholder="admin_user / admin@manufactura.com"
                    />
                </div>
            </div>

            <div class="input-group-custom">
                <label for="password">CONTRASEÑA</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input
                        id="password"
                        type="password"
                        formControlName="password"
                        placeholder="••••••••"
                    />
                </div>
            </div>

            <div class="error-container" *ngIf="errorMessage">
                <span class="error-icon">⚠️</span> {{ errorMessage }}
            </div>

            <button
                type="submit"
                class="btn-login"
                [disabled]="loginForm.invalid"
            >
                <span>Ingresar al Sistema</span>
            </button>

            <footer class="form-footer">
                <p>
                    ¿Olvidaste tu contraseña? <a href="#">Contactar soporte</a>
                </p>
            </footer>
        </form>
    </div>
</div>
